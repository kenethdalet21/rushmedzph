server.port=8086
spring.application.name=epharma-backend

# Actuator endpoints
management.endpoints.web.exposure.include=health,info,mappings
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=always
management.info.build.enabled=true
management.info.java.enabled=true
management.info.env.enabled=true

# H2 + JPA (dev)
spring.datasource.url=jdbc:h2:file:./data/epharma;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Logging
logging.level.com.epharma=DEBUG
logging.level.org.springframework.web=DEBUG

# Webhook secrets (set real values in production)
webhook.gcash.secret=
webhook.paymaya.secret=
webhook.paypal.secret=
webhook.razorpay.secret=

# JWT
security.jwt.secret=this-is-a-very-secure-secret-key-for-epharma-2025-production-grade
security.jwt.issuer=epharma
security.jwt.expirationMinutes=120

# ===================================
# SMS Gateway Configuration
# ===================================
# Supported providers: semaphore, infobip, twilio, nexmo
# Set enabled=true and configure provider credentials for production
sms.gateway.enabled=false
sms.gateway.provider=semaphore
sms.gateway.api-key=
sms.gateway.sender-id=EPHARMA

# SMS Provider: Semaphore (Philippines-focused)
# Sign up: https://semaphore.co/
# Supports: Globe, Smart, TM, Talk n' Text, DITO
# Note: Get API key from https://semaphore.co/dashboard

# SMS Provider: Infobip
# Sign up: https://www.infobip.com/
# Global coverage with Philippine support

# SMS Provider: Twilio
# Sign up: https://www.twilio.com/
# Global SMS coverage

# SMS Provider: Nexmo/Vonage
# Sign up: https://www.vonage.com/
# Global SMS coverage

# ===================================
# Email Gateway Configuration
# ===================================
# Supported providers: smtp, sendgrid, ses
email.enabled=false
email.provider=smtp
email.from=noreply@epharma.com
email.from-name=E-Pharmacy

