<svg xmlns="http://www.w3.org/2000/svg" width="2048" height="2048" viewBox="0 0 2048 2048">
  <!-- White/light background -->
  <rect x="0" y="0" width="2048" height="2048" fill="#FFFFFF"/>
  
  <!-- Medical cross symbol -->
  <g transform="translate(1024, 800)">
    <rect x="-60" y="-160" width="120" height="320" rx="20" fill="#F59E0B"/>
    <rect x="-160" y="-60" width="320" height="120" rx="20" fill="#F59E0B"/>
  </g>
  
  <!-- RushMedz branding -->
  <text x="1024" y="1200" font-family="Arial, Helvetica, sans-serif" font-size="120" font-weight="bold" fill="#F59E0B" text-anchor="middle">RushMedz</text>
  
  <!-- App name -->
  <text x="1024" y="1320" font-family="Arial, Helvetica, sans-serif" font-size="80" font-weight="600" fill="#D97706" text-anchor="middle">Driver App</text>
  
  <!-- Tagline -->
  <text x="1024" y="1420" font-family="Arial, Helvetica, sans-serif" font-size="50" fill="#666666" text-anchor="middle">Your Health, Delivered</text>
</svg>
