<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- Transparent background for adaptive icon -->
  <rect x="0" y="0" width="1024" height="1024" fill="transparent"/>
  
  <!-- Medical cross symbol centered -->
  <g transform="translate(0, -50)">
    <rect x="452" y="280" width="120" height="320" rx="20" fill="#F59E0B"/>
    <rect x="352" y="380" width="320" height="120" rx="20" fill="#F59E0B"/>
  </g>
  
  <!-- RushMedz text -->
  <text x="512" y="700" font-family="Arial, Helvetica, sans-serif" font-size="90" font-weight="bold" fill="#F59E0B" text-anchor="middle">RushMedz</text>
  
  <!-- App type -->
  <text x="512" y="790" font-family="Arial, Helvetica, sans-serif" font-size="60" font-weight="600" fill="#D97706" text-anchor="middle">Driver</text>
</svg>
